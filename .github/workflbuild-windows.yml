name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pillow pypdf reportlab pyinstaller

      - name: Crear EXE
        run: |
          pyinstaller --clean --noconfirm --windowed --onefile --name "Astrid Lopez" --add-data "fonts;fonts" main.py

      - name: Guardar EXE
        uses: actions/upload-artifact@v4
        with:
          name: Astrid-Lopez-Windows
          path: dist/**
